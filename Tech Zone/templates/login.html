{% extends "base.html" %}

{% block title %}Login | TechZone{% endblock %}

{% block content %}

<div class="container py-5 mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="card bg-dark text-white shadow-lg border-danger">

                <div class="card-body p-5">

                    <h2 class="text-center text-danger mb-4">
                        Login
                    </h2>

                    <form method="POST" action="{{ url_for('login') }}">

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-danger w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">

                        Don't have an account?

                        <a href="{{ url_for('register') }}" class="text-danger">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
