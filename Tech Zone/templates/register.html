{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container mt-5 pt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card bg-dark text-white shadow p-4">

<h2 class="text-center text-danger mb-4">
Create Account
</h2>

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
class="btn btn-danger w-100">

Register

</button>

</form>

<hr>

<p class="text-center">

Already have an account?

<a href="/login" class="text-danger">

Login

</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
