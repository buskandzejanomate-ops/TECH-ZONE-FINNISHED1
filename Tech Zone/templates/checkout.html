{% extends "base.html" %}

{% block title %}Checkout | TechZone{% endblock %}

{% block content %}

<section class="container py-5 mt-5">

    <div class="text-center mb-5">

        <h1 class="display-4 fw-bold text-danger">
            Checkout
        </h1>

        <p class="text-secondary">
            Complete your order securely.
        </p>

    </div>

    <div class="row g-4">

        <!-- Billing Information -->

        <div class="col-lg-8">

            <div class="product-card">

                <h3 class="mb-4">
                    Billing Information
                </h3>

                <form>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">First Name</label>

                            <input type="text" class="form-control" required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">Last Name</label>

                            <input type="text" class="form-control" required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Email</label>

                        <input type="email" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Phone</label>

                        <input type="text" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Address</label>

                        <input type="text" class="form-control" required>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">City</label>

                            <input type="text" class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">ZIP Code</label>

                            <input type="text" class="form-control">

                        </div>

                    </div>

                    <hr>

                    <h4 class="mb-3">
                        Payment Method
                    </h4>

                    <div class="form-check mb-2">

                        <input class="form-check-input"
                               type="radio"
                               name="payment"
                               checked>

                        <label class="form-check-label">

                            Credit / Debit Card

                        </label>

                    </div>

                    <div class="form-check mb-2">

                        <input class="form-check-input"
                               type="radio"
                               name="payment">

                        <label class="form-check-label">

                            PayPal

                        </label>

                    </div>

                    <div class="form-check mb-4">

                        <input class="form-check-input"
                               type="radio"
                               name="payment">

                        <label class="form-check-label">

                            Cash on Delivery

                        </label>

                    </div>

                    <button class="btn btn-danger btn-lg w-100">

                        <i class="bi bi-credit-card"></i>

                        Place Order

                    </button>

                </form>

            </div>

        </div>

        <!-- Order Summary -->

        <div class="col-lg-4">

            <div class="product-card">

                <h3 class="mb-4">

                    Order Summary

                </h3>

                <div class="d-flex justify-content-between mb-2">

                    <span>Products</span>

                    <span id="checkoutItems">0</span>

                </div>

                <div class="d-flex justify-content-between mb-2">

                    <span>Shipping</span>

                    <span>FREE</span>

                </div>

                <hr>

                <div class="d-flex justify-content-between">

                    <h4>Total</h4>

                    <h4 id="checkoutTotal">₾0</h4>

                </div>

            </div>

        </div>

    </div>

</section>

<script>

const cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("checkoutItems").innerText = cart.length;

let total = 0;

cart.forEach(item=>{

    total += Number(item.price.replace(/[^\d]/g,""));

});

document.getElementById("checkoutTotal").innerText = "₾"+total;

</script>

{% endblock %}
