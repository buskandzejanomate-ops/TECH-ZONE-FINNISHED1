{% extends "base.html" %}

{% block title %}Shopping Cart{% endblock %}

{% block content %}

<section class="container py-5 mt-5">

<div class="row">

<div class="col-lg-8">

<h1 class="mb-4">

<i class="bi bi-cart3 text-danger"></i>

Shopping Cart

</h1>

<div id="cartItems">

<!-- JS inserts products here -->

</div>

</div>

<div class="col-lg-4">

<div class="product-card sticky-top" style="top:100px;">

<h3>

Order Summary

</h3>

<hr>

<div class="d-flex justify-content-between">

<span>

Items

</span>

<span id="itemCount">

0

</span>

</div>

<div class="d-flex justify-content-between mt-2">

<span>

Total

</span>

<h4 class="text-danger">

₾<span id="cartTotal">0</span>

</h4>

</div>

<a href="/checkout"

class="btn btn-danger w-100 mt-4">

Proceed To Checkout

</a>

<button

class="btn btn-outline-light w-100 mt-3"

onclick="clearCart()">

Clear Cart

</button>

</div>

</div>

</div>

</section>

<script src="{{ url_for('static', filename='js/cart.js') }}"></script>

<a href="{{ url_for('checkout') }}" class="btn btn-danger btn-lg w-100 mt-3">

    <i class="bi bi-credit-card"></i>

    Proceed to Checkout

</a>

{% endblock %}
